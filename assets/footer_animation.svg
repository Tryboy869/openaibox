<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="900" height="80"
     role="img" aria-labelledby="footer-title">
  <title id="footer-title">GraphRuntime footer</title>
  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#58a6ff"/>
      <stop offset="70%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="80" fill="url(#footerBg)"/>

  <!-- Top border wave -->
  <rect width="900" height="1" y="0" fill="url(#wave)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated dots (data flowing) -->
  <g>
    <circle r="2.5" fill="#58a6ff" cx="0" cy="40">
      <animateMotion dur="4s" repeatCount="indefinite"
        path="M0,0 L900,0"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#3fb950" cx="0" cy="40">
      <animateMotion dur="4s" begin="1.3s" repeatCount="indefinite"
        path="M0,0 L900,0"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#d2a8ff" cx="0" cy="40">
      <animateMotion dur="4s" begin="2.6s" repeatCount="indefinite"
        path="M0,0 L900,0"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#f78166" cx="0" cy="40">
      <animateMotion dur="4s" begin="0.7s" repeatCount="indefinite"
        path="M0,0 L900,0"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="4s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Footer text -->
  <text x="450" y="36" text-anchor="middle" fill="#6e7681" font-size="12" font-family="monospace">
    GraphRuntime v1.0.0-beta — Open AI Box
  </text>
  <text x="450" y="58" text-anchor="middle" fill="#484f58" font-size="10" font-family="monospace">
    Built by Daouda Abdoul Anzize  •  MIT License  •  github.com/tryboy869/graphruntime
  </text>
</svg>
