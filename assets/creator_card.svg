<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" width="680" height="200"
     role="img" aria-labelledby="creator-title">
  <title id="creator-title">Daouda Abdoul Anzize — Computational Paradigm Designer</title>
  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <filter id="avatarGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="680" height="200" fill="url(#cardBg)" rx="12"
        stroke="#30363d" stroke-width="1"/>

  <!-- Accent top line -->
  <rect width="680" height="3" fill="url(#accentLine)" rx="12">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Avatar circle -->
  <circle cx="72" cy="100" r="44" fill="#21262d" stroke="url(#accentLine)"
          stroke-width="2" filter="url(#avatarGlow)">
    <animate attributeName="r" values="44;47;44" dur="4s" repeatCount="indefinite"/>
  </circle>
  <text x="72" y="107" text-anchor="middle" font-size="32">🌌</text>

  <!-- Name + title -->
  <text x="140" y="55" fill="white" font-size="18" font-family="monospace"
        font-weight="bold" letter-spacing="0.5">Daouda Abdoul Anzize</text>
  <text x="140" y="76" fill="#58a6ff" font-size="12" font-family="monospace"
        letter-spacing="1">Computational Paradigm Designer</text>

  <!-- Quote -->
  <text x="140" y="100" fill="#8b949e" font-size="11" font-family="monospace"
        font-style="italic">
    "I don't build apps. I build the clay others use to build apps."
  </text>

  <!-- Meta -->
  <text x="140" y="122" fill="#6e7681" font-size="11" font-family="monospace">
    24 ans  •  Cotonou, Bénin  →  Global Remote
  </text>

  <!-- Tags -->
  <g font-family="monospace" font-size="10">
    <rect x="140" y="135" width="105" height="18" rx="4" fill="#21262d" stroke="#30363d"/>
    <text x="192" y="148" text-anchor="middle" fill="#58a6ff">Meta-Architectures</text>

    <rect x="253" y="135" width="115" height="18" rx="4" fill="#21262d" stroke="#30363d"/>
    <text x="310" y="148" text-anchor="middle" fill="#3fb950">Universal Protocols</text>

    <rect x="376" y="135" width="110" height="18" rx="4" fill="#21262d" stroke="#30363d"/>
    <text x="431" y="148" text-anchor="middle" fill="#d2a8ff">AI Infrastructure</text>

    <rect x="494" y="135" width="120" height="18" rx="4" fill="#21262d" stroke="#30363d"/>
    <text x="554" y="148" text-anchor="middle" fill="#f78166">Emergent Computing</text>
  </g>

  <!-- Contact line -->
  <text x="140" y="178" fill="#6e7681" font-size="10" font-family="monospace">
    github.com/tryboy869  •  @Nexusstudio100  •  tryboy869.github.io/daa
  </text>

  <!-- Animated corner accent -->
  <circle cx="660" cy="20" r="3" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="648" cy="20" r="2" fill="#d2a8ff">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
